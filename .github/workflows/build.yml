name: Build

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6

      - name: Build
        run: |
          chmod +x gradlew
          ./gradlew clean build --stacktrace

      - name: Upload jar
        uses: actions/upload-artifact@v6
        with:
          name: ae2-crafting-optimizer-${{ github.sha }}
          path: build/libs/*.jar
          if-no-files-found: error
